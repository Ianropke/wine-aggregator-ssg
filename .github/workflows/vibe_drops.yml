name: Vibe Drops (Weekly Wine Release)

on:
  schedule:
    - cron: '0 10 * * 4' # Runs at 10:00 AM UTC every Thursday
  workflow_dispatch: # Allows manual trigger

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn
          
      - name: Run Pipeline
        run: python scripts/pipeline.py
        
      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/wines/ src/data/
          # Only commit if there are changes
          if ! git diff --staged --empty; then
            git commit -m "chore: Vibe Drop - Weekly wine release"
            git push
          else
            echo "No changes to commit."
          fi
