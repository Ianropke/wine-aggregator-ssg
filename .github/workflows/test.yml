name: CI Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-python:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        pip install -r python-requirements.txt
        
    - name: Lint with flake8
      run: |
        flake8 scripts/ tests/python/
        
    - name: Test with pytest
      run: |
        pytest tests/python/

  test-frontend:
    runs-on: ubuntu-latest
    needs: test-python # Optional, men god praksis at backend/data er i orden først
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        
    - name: Set up Python (for data pipeline inside build)
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: npm install
      
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium
      
    - name: Build and Test
      run: |
        # Kører bygge-scriptet som inkluderer python data generation + astro build
        npm run build
        # Kører Playwright mod den færdige side
        npx playwright test --project=chromium
        
    - name: Upload Playwright report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 10
